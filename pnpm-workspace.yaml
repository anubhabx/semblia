packages:
  - apps/*
  - packages/*

pmOnFail: download
verifyDepsBeforeRun: warn

overrides:
  '@hono/node-server': 1.19.13
  axios: 1.16.0
  fast-uri: 3.1.2
  follow-redirects: 1.16.0
  form-data: 4.0.6
  hono: 4.12.25
  js-cookie: 3.0.8
  js-yaml: 4.3.0
  multer: 2.2.0
  qs: 6.15.3
  uuid: 11.1.1

allowBuilds:
  '@clerk/shared': true
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@swc/core': true
  '@tailwindcss/oxide': true
  core-js-pure: true
  esbuild: true
  msgpackr-extract: true
  msw: true
  prisma: true
  sharp: true
  unrs-resolver: true
